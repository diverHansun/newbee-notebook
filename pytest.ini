[pytest]
# Pytest configuration for newbee-notebook

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Directories to search for tests
testpaths = newbee_notebook/tests

# Minimum Python version
minversion = 6.0

# Add project root to path
pythonpath = .

# Output options
addopts =
    -v
    --strict-markers
    --tb=short

# Markers for organizing tests
markers =
    unit: Unit tests — pure isolation, all external dependencies mocked
    contract: Contract tests — API boundary and protocol format verification
    integration: Integration tests — real component collaboration
    smoke: Smoke tests — infrastructure and deployment verification
    slow: Tests that take a long time to run
    requires_api: Tests that require external API access (like LLM/embedding API)

# Coverage options (if pytest-cov is installed)
# addopts = --cov=src --cov-report=html --cov-report=term
