# Docker Compose configuration for Newbee Notebook infrastructure
# 
# This file provides PostgreSQL with pgvector, Elasticsearch, and Kibana services
# for local development and testing.
#
# Usage:
#   docker-compose up -d              # Start all services in background
#   docker-compose up -d postgres es  # Start only databases (without Kibana)
#   docker-compose down               # Stop and remove services
#   docker-compose logs -f            # View logs
#
# Web UIs:
#   Kibana: http://localhost:5601 (Elasticsearch visualization)

services:
  redis:
    image: redis:7.2
    container_name: newbee-notebook-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - newbee_notebook_network

  postgres:
    image: pgvector/pgvector:pg16
    container_name: newbee-notebook-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-newbee_notebook_password}
      POSTGRES_DB: ${POSTGRES_DB:-newbee_notebook}
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Mount init script - runs automatically on first container start
      - ./newbee_notebook/scripts/db/init-postgres.sql:/docker-entrypoint-initdb.d/init-postgres.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - newbee_notebook_network

  elasticsearch:
    image: elasticsearch:8.19.0
    container_name: newbee-notebook-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - newbee_notebook_network

  # Celery worker for async document processing (uses local code)
  celery-worker:
    image: python:3.11-slim
    container_name: newbee-notebook-celery-worker
    working_dir: /app
    volumes:
      - ./:/app
    command: >
      bash -c "pip install -q -r requirements.txt && \
               celery -A newbee_notebook.infrastructure.tasks.celery_app worker --loglevel=info"
    env_file:
      - .env
    environment:
      # Override URLs for Docker internal network
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      REDIS_HOST: redis
      POSTGRES_HOST: postgres
      ELASTICSEARCH_URL: http://elasticsearch:9200
      # Library-first workflow storage root
      DOCUMENTS_DIR: ${DOCUMENTS_DIR:-data/documents}
      # Worker should process asynchronously by default
      PROCESS_UPLOAD_SYNC: ${PROCESS_UPLOAD_SYNC:-false}
      # MinerU document-processing configuration
      MINERU_ENABLED: ${MINERU_ENABLED:-true}
      MINERU_MODE: ${MINERU_MODE:-cloud}
      MINERU_API_KEY: ${MINERU_API_KEY:-}
      MINERU_V4_API_BASE: ${MINERU_V4_API_BASE:-https://mineru.net}
      MINERU_V4_TIMEOUT: ${MINERU_V4_TIMEOUT:-120}
      MINERU_V4_POLL_INTERVAL: ${MINERU_V4_POLL_INTERVAL:-5}
      MINERU_V4_MAX_WAIT_SECONDS: ${MINERU_V4_MAX_WAIT_SECONDS:-1800}
      MINERU_FAIL_THRESHOLD: ${MINERU_FAIL_THRESHOLD:-5}
      MINERU_COOLDOWN_SECONDS: ${MINERU_COOLDOWN_SECONDS:-120}
      MINERU_LOCAL_API_URL: ${MINERU_LOCAL_API_URL:-http://mineru-api:8000}
      MINERU_LOCAL_TIMEOUT: ${MINERU_LOCAL_TIMEOUT:-0}
      MINERU_BACKEND: ${MINERU_BACKEND:-pipeline}
      MINERU_LANG_LIST: ${MINERU_LANG_LIST:-ch,en}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      elasticsearch:
        condition: service_healthy
    networks:
      - newbee_notebook_network
    restart: unless-stopped

  # Optional: Flower monitoring UI for Celery (enable with --profile monitor)
  flower:
    image: python:3.11-slim
    container_name: newbee-notebook-flower
    working_dir: /app
    volumes:
      - ./:/app
    command: >
      bash -c "pip install -q -r requirements.txt && \
               celery -A newbee_notebook.infrastructure.tasks.celery_app flower --port=${FLOWER_PORT:-5555}"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - newbee_notebook_network
    ports:
      - "${FLOWER_PORT:-5555}:${FLOWER_PORT:-5555}"
    restart: unless-stopped
    profiles:
      - monitor

  # Kibana for Elasticsearch visualization and debugging
  kibana:
    image: kibana:8.19.0
    container_name: newbee-notebook-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - newbee_notebook_network
    # Optional: comment out this service if you don't need Kibana
    profiles:
      - debug

  # MinerU PDF -> Markdown service
  mineru-api:
    build:
      context: ./docker/mineru
      dockerfile: Dockerfile.cpu
    image: medimind/mineru-api:cpu
    container_name: newbee-notebook-mineru-api
    restart: unless-stopped
    environment:
      # Use ModelScope for model downloads; models are persisted via `mineru_cache` volume.
      MINERU_MODEL_SOURCE: modelscope
      MINERU_DEVICE_MODE: cpu
      # FastAPI docs are also used as a simple readiness probe.
      MINERU_API_ENABLE_FASTAPI_DOCS: ${MINERU_API_ENABLE_FASTAPI_DOCS:-1}
      # Limit concurrent requests to avoid CPU overload by default.
      MINERU_API_MAX_CONCURRENT_REQUESTS: ${MINERU_API_MAX_CONCURRENT_REQUESTS:-1}
    volumes:
      - mineru_cache:/root/.cache
    ports:
      - "8001:8000"
    networks:
      - newbee_notebook_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/docs >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
    profiles:
      - mineru-local

volumes:
  postgres_data:
    driver: local
  elasticsearch_data:
    driver: local
  redis_data:
    driver: local
  mineru_cache:
    driver: local

networks:
  newbee_notebook_network:
    name: newbee_notebook_network
    driver: bridge
