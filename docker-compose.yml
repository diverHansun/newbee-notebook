# Docker Compose configuration for MediMind Agent infrastructure
# 
# This file provides PostgreSQL with pgvector, Elasticsearch, and Kibana services
# for local development and testing.
#
# Usage:
#   docker-compose up -d              # Start all services in background
#   docker-compose up -d postgres es  # Start only databases (without Kibana)
#   docker-compose down               # Stop and remove services
#   docker-compose logs -f            # View logs
#
# Web UIs:
#   Kibana: http://localhost:5601 (Elasticsearch visualization)

version: '3.8'

services:
  redis:
    image: redis:7.2
    container_name: medimind-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - medimind_network

  postgres:
    image: pgvector/pgvector:pg16
    container_name: medimind-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medimind_password}
      POSTGRES_DB: ${POSTGRES_DB:-medimind}
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Mount init script - runs automatically on first container start
      - ./medimind_agent/scripts/db/init-postgres.sql:/docker-entrypoint-initdb.d/init-postgres.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medimind_network

  elasticsearch:
    image: elasticsearch:8.19.0
    container_name: medimind-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - medimind_network

  # Celery worker for async document processing (uses local code)
  celery-worker:
    image: python:3.11-slim
    container_name: medimind-celery-worker
    working_dir: /app
    volumes:
      - ./:/app
    command: >
      bash -c "pip install -q -r requirements.txt && \
               celery -A medimind_agent.infrastructure.tasks.celery_app worker --loglevel=info"
    env_file:
      - .env
    environment:
      # Override Redis URLs for Docker internal network
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      elasticsearch:
        condition: service_healthy
    networks:
      - medimind_network
    restart: unless-stopped

  # Optional: Flower monitoring UI for Celery (enable with --profile monitor)
  flower:
    image: python:3.11-slim
    container_name: medimind-flower
    working_dir: /app
    volumes:
      - ./:/app
    command: >
      bash -c "pip install -q -r requirements.txt && \
               celery -A medimind_agent.infrastructure.tasks.celery_app flower --port=${FLOWER_PORT:-5555}"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - medimind_network
    ports:
      - "${FLOWER_PORT:-5555}:${FLOWER_PORT:-5555}"
    restart: unless-stopped
    profiles:
      - monitor

  # Kibana for Elasticsearch visualization and debugging
  kibana:
    image: kibana:8.19.0
    container_name: medimind-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - medimind_network
    # Optional: comment out this service if you don't need Kibana
    profiles:
      - debug

volumes:
  postgres_data:
    driver: local
  elasticsearch_data:
    driver: local
  redis_data:
    driver: local

networks:
  medimind_network:
    driver: bridge
