# Docker Compose configuration for Newbee Notebook infrastructure
# 
# This file provides the full non-GPU stack (frontend, API, worker, and infra)
# for local development and testing.
#
# Usage:
#   docker-compose up -d              # Start all services in background
#   docker-compose up -d postgres es  # Start only databases (without Kibana)
#   docker-compose down               # Stop and remove services
#   docker-compose down -v            # Remove Docker volumes (host bind-mount files are preserved)
#   docker-compose logs -f            # View logs
#
# Web UIs:
#   Kibana: http://localhost:5601 (Elasticsearch visualization)

services:
  redis:
    image: redis:7.2
    container_name: newbee-notebook-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - newbee_notebook_network

  postgres:
    image: pgvector/pgvector:pg16
    container_name: newbee-notebook-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-newbee_notebook_password}
      POSTGRES_DB: ${POSTGRES_DB:-newbee_notebook}
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Mount init script - runs automatically on first container start
      - ./newbee_notebook/scripts/db/init-postgres.sql:/docker-entrypoint-initdb.d/init-postgres.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - newbee_notebook_network

  elasticsearch:
    image: elasticsearch:8.19.0
    container_name: newbee-notebook-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - newbee_notebook_network

  # MinIO object storage (default storage backend)
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1@sha256:13582eff79c6605a2d315bdd0e70164142ea7e98fc8411e9e10d089502a6d883
    container_name: newbee-notebook-minio
    command: server /data --console-address ":9001"
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
      MINIO_SERVER_URL: ${MINIO_SERVER_URL:-http://localhost:9000}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - newbee_notebook_network
    restart: unless-stopped

  # Celery worker for async document processing (uses local code)
  celery-worker:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
      args:
        TORCH_VERSION: ${PYTHON_RUNTIME_TORCH_VERSION:-2.9.0}
    image: newbee-notebook/worker:latest
    container_name: newbee-notebook-celery-worker
    working_dir: /app
    volumes:
      - ./:/app
    command:
      - celery
      - -A
      - newbee_notebook.infrastructure.tasks.celery_app
      - worker
      - --loglevel=info
      - --concurrency=${CELERY_CONCURRENCY:-1}
      - --prefetch-multiplier=${CELERY_PREFETCH_MULTIPLIER:-1}
      - --max-tasks-per-child=${CELERY_MAX_TASKS_PER_CHILD:-4}
    env_file:
      - .env
    environment:
      # Override URLs for Docker internal network
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      PIPELINE_LOCK_REDIS_URL: redis://redis:6379/0
      REDIS_HOST: redis
      POSTGRES_HOST: postgres
      ELASTICSEARCH_URL: http://elasticsearch:9200
      # Library-first workflow storage root
      DOCUMENTS_DIR: ${DOCUMENTS_DIR:-data/documents}
      STORAGE_BACKEND: minio
      MINIO_ENDPOINT: ${MINIO_INTERNAL_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin123}
      MINIO_BUCKET: ${MINIO_BUCKET:-documents}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-localhost:9000}
      # Non-GPU default: use API embedding runtime.
      EMBEDDING_PROVIDER: qwen3-embedding
      QWEN3_EMBEDDING_MODE: api
      QWEN3_EMBEDDING_API_MODEL: ${QWEN3_EMBEDDING_API_MODEL:-text-embedding-v4}
      QWEN3_EMBEDDING_API_BASE: ${QWEN3_EMBEDDING_API_BASE:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      # Worker should process asynchronously by default
      PROCESS_UPLOAD_SYNC: ${PROCESS_UPLOAD_SYNC:-false}
      # MinerU document-processing configuration
      MINERU_ENABLED: ${MINERU_ENABLED:-true}
      MINERU_MODE: cloud
      MINERU_LOCAL_ENABLED: "false"
      MINERU_API_KEY: ${MINERU_API_KEY:-}
      MINERU_V4_API_BASE: ${MINERU_V4_API_BASE:-https://mineru.net}
      MINERU_V4_TIMEOUT: ${MINERU_V4_TIMEOUT:-120}
      MINERU_V4_POLL_INTERVAL: ${MINERU_V4_POLL_INTERVAL:-5}
      MINERU_V4_MAX_WAIT_SECONDS: ${MINERU_V4_MAX_WAIT_SECONDS:-1800}
      MINERU_FAIL_THRESHOLD: ${MINERU_FAIL_THRESHOLD:-5}
      MINERU_COOLDOWN_SECONDS: ${MINERU_COOLDOWN_SECONDS:-120}
      MINERU_LOCAL_API_URL: ${MINERU_INTERNAL_API_URL:-http://mineru-api:8000}
      MINERU_LOCAL_TIMEOUT: ${MINERU_LOCAL_TIMEOUT:-0}
      MINERU_BACKEND: ${MINERU_BACKEND:-pipeline}
      MINERU_LANG_LIST: ${MINERU_LANG_LIST:-ch,en}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      elasticsearch:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - newbee_notebook_network
    restart: unless-stopped

  # Backend API service (same startup entry as local: python main.py)
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
      args:
        TORCH_VERSION: ${PYTHON_RUNTIME_TORCH_VERSION:-2.9.0}
    image: newbee-notebook/api:latest
    container_name: newbee-notebook-api
    command: ["python", "main.py", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      ELASTICSEARCH_URL: http://elasticsearch:9200
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      PIPELINE_LOCK_REDIS_URL: redis://redis:6379/0
      STORAGE_BACKEND: minio
      MINIO_ENDPOINT: ${MINIO_INTERNAL_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin123}
      MINIO_BUCKET: ${MINIO_BUCKET:-documents}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-localhost:9000}
      EMBEDDING_PROVIDER: qwen3-embedding
      QWEN3_EMBEDDING_MODE: api
      QWEN3_EMBEDDING_API_MODEL: ${QWEN3_EMBEDDING_API_MODEL:-text-embedding-v4}
      QWEN3_EMBEDDING_API_BASE: ${QWEN3_EMBEDDING_API_BASE:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      MINERU_MODE: cloud
      MINERU_LOCAL_ENABLED: "false"
      MINERU_LOCAL_API_URL: ${MINERU_INTERNAL_API_URL:-http://mineru-api:8000}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      elasticsearch:
        condition: service_healthy
      minio:
        condition: service_healthy
      celery-worker:
        condition: service_started
    networks:
      - newbee_notebook_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 20s

  # Frontend service (production mode: pnpm build + pnpm start)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        INTERNAL_API_URL: http://api:8000
    image: newbee-notebook/frontend:latest
    container_name: newbee-notebook-frontend
    environment:
      NODE_ENV: production
      INTERNAL_API_URL: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - newbee_notebook_network
    restart: unless-stopped

  # Optional: Flower monitoring UI for Celery (enable with --profile monitor)
  flower:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
      args:
        TORCH_VERSION: ${PYTHON_RUNTIME_TORCH_VERSION:-2.9.0}
    image: newbee-notebook/worker:latest
    container_name: newbee-notebook-flower
    working_dir: /app
    volumes:
      - ./:/app
    command:
      - celery
      - -A
      - newbee_notebook.infrastructure.tasks.celery_app
      - flower
      - --port=${FLOWER_PORT:-5555}
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - newbee_notebook_network
    ports:
      - "${FLOWER_PORT:-5555}:${FLOWER_PORT:-5555}"
    restart: unless-stopped
    profiles:
      - monitor

  # Kibana for Elasticsearch visualization and debugging
  kibana:
    image: kibana:8.19.0
    container_name: newbee-notebook-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - newbee_notebook_network
    # Optional: comment out this service if you don't need Kibana
    profiles:
      - debug

volumes:
  postgres_data:
    driver: local
  elasticsearch_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  newbee_notebook_network:
    name: newbee_notebook_network
    driver: bridge
