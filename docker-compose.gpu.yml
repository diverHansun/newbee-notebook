services:
  # Worker override: GPU-capable PyTorch image so local embedding runs on CUDA.
  # Uses pytorch/pytorch base and skips re-installing CPU torch from requirements.txt.
  celery-worker:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
      args:
        BASE_IMAGE: ${CELERY_WORKER_BASE_IMAGE:-pytorch/pytorch:2.9.0-cuda12.8-cudnn9-runtime}
        TORCH_INSTALL_MODE: skip
    image: newbee-notebook/worker:gpu
    command:
      - celery
      - -A
      - newbee_notebook.infrastructure.tasks.celery_app
      - worker
      - --loglevel=info
      - --concurrency=${CELERY_CONCURRENCY:-1}
      - --prefetch-multiplier=${CELERY_PREFETCH_MULTIPLIER:-1}
      - --max-tasks-per-child=${CELERY_MAX_TASKS_PER_CHILD:-4}
    environment:
      MINERU_MODE: local
      MINERU_LOCAL_ENABLED: "true"
      MINERU_BACKEND: hybrid-auto-engine
      EMBEDDING_PROVIDER: qwen3-embedding
      QWEN3_EMBEDDING_MODE: local
      QWEN3_EMBEDDING_DEVICE: cuda
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ipc: host
    shm_size: "16gb"

  # API override: expose MinerU local mode as switchable in settings.
  api:
    volumes:
      - ./models:/app/models:ro
    environment:
      MINERU_MODE: local
      MINERU_LOCAL_ENABLED: "true"
      QWEN3_EMBEDDING_MODE: local
      QWEN3_EMBEDDING_MODEL_PATH: models/Qwen3-Embedding-0.6B

  # GPU MinerU PDF -> Markdown service.
  # Use together with the base compose file:
  #   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d --build
  mineru-api:
    build:
      context: ./docker/mineru
      dockerfile: Dockerfile.gpu
    image: newbee-notebook/mineru-api:gpu
    container_name: newbee-notebook-mineru-api
    restart: unless-stopped
    environment:
      MINERU_MODEL_SOURCE: modelscope
      MINERU_DEVICE_MODE: cuda
      MINERU_API_ENABLE_FASTAPI_DOCS: ${MINERU_API_ENABLE_FASTAPI_DOCS:-1}
      MINERU_API_MAX_CONCURRENT_REQUESTS: ${MINERU_API_MAX_CONCURRENT_REQUESTS:-1}
      # Limit PDF rendering parallelism to reduce peak memory usage.
      MINERU_PDF_RENDER_THREADS: "1"
      # Force clean_vram() to trigger after each inference stage.
      MINERU_VIRTUAL_VRAM_SIZE: "8"
    volumes:
      - mineru_cache:/root/.cache
    ports:
      - "8001:8000"
    networks:
      - newbee_notebook_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/docs >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ipc: host
    shm_size: "32gb"
    ulimits:
      memlock: -1
      stack: 67108864

volumes:
  mineru_cache:
    driver: local
