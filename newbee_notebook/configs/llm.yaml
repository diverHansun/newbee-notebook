# LLM configuration

llm:
  # Provider selection: 'zhipu', 'qwen', 'openai'
  # Can be overridden by LLM_PROVIDER
  provider: qwen

  # Runtime defaults used by the batch-2 OpenAI-compatible LLM client.
  zhipu:
    model: glm-4.7
    temperature: 0.7
    max_tokens: 32768
    top_p: 0.8
    api_base: https://open.bigmodel.cn/api/paas/v4

  # Alibaba Cloud DashScope Qwen via OpenAI-compatible endpoint.
  qwen:
    model: qwen3.5-plus
    temperature: 0.7
    max_tokens: 32768
    top_p: 0.8
    api_base: https://dashscope.aliyuncs.com/compatible-mode/v1

  # Native OpenAI models.
  openai:
    model: gpt-4o-mini
    temperature: 0.2
    max_tokens: 4096
    top_p: 1.0
