# Celery configuration
broker_url: ${CELERY_BROKER_URL:redis://localhost:6379/0}
result_backend: ${CELERY_RESULT_BACKEND:redis://localhost:6379/0}
timezone: UTC
enable_utc: true
worker_concurrency: ${CELERY_CONCURRENCY:4}
worker_prefetch_multiplier: 1
acks_late: true
track_started: true
task_serializer: json
result_serializer: json
accept_content: ["json"]
task_routes:
  tasks.document: {queue: documents}
  tasks.embedding: {queue: embeddings}
  tasks.video: {queue: videos}
  tasks.default: {queue: default}
broker_connection_retry_on_startup: true