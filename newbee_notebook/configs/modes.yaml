# Runtime mode policy reference for batch-2.

modes:
  agent:
    execution_style: open_loop
    tools:
      - knowledge_base
      - time
    description: "Canonical runtime mode for free-form conversation and tool use"

  ask:
    execution_style: open_loop
    tools:
      - knowledge_base
      - time
    first_turn_tool_repair:
      tool_name: knowledge_base
      limit: 1
    description: "Notebook-grounded Q&A with a soft first-turn repair toward knowledge_base"

  explain:
    execution_style: retrieval_required_loop
    required_tool: knowledge_base
    max_retrieval_iterations: 3
    initial_scope: document
    allow_scope_relaxation: true
    skip_condense: true
    description: "Selected-text explanation using repeated knowledge-base retrieval before synthesis"

  conclude:
    execution_style: retrieval_required_loop
    required_tool: knowledge_base
    max_retrieval_iterations: 3
    initial_scope: document
    allow_scope_relaxation: true
    skip_condense: true
    description: "Selected-text summarization using repeated knowledge-base retrieval before synthesis"

retrieval:
  explain_defaults:
    search_type: keyword
    max_results: 5
  conclude_defaults:
    search_type: hybrid
    max_results: 8
