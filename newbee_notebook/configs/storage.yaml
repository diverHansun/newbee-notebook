# Storage configuration for vector stores and databases

postgresql:
  host: ${POSTGRES_HOST:localhost}
  port: ${POSTGRES_PORT:5432}
  database: ${POSTGRES_DB:newbee_notebook}
  user: ${POSTGRES_USER:postgres}
  password: ${POSTGRES_PASSWORD:}

# Multi-provider pgvector configuration
pgvector:
  # Provider-specific tables.
  # Note: LlamaIndex automatically prefixes table names with `data_`.
  tables:
    qwen3-embedding:
      table_name: documents_qwen3_embedding   # Actual table: data_documents_qwen3_embedding
      embedding_dimension: 1024
      distance_metric: cosine
    zhipu:
      table_name: documents_zhipu             # Actual table: data_documents_zhipu
      embedding_dimension: 1024
      distance_metric: cosine

  # Legacy fallback when provider-specific mapping is missing
  table_name: documents_qwen3_embedding
  embedding_dimension: 1024
  distance_metric: cosine

elasticsearch:
  url: ${ELASTICSEARCH_URL:http://localhost:9200}
  index_name: newbee_notebook_docs
  # api_key: ${ELASTICSEARCH_API_KEY:}
  # cloud_id: ${ELASTICSEARCH_CLOUD_ID:}
