# Storage configuration for vector stores and databases

postgresql:
  host: ${POSTGRES_HOST:localhost}
  port: ${POSTGRES_PORT:5432}
  database: ${POSTGRES_DB:newbee_notebook}
  user: ${POSTGRES_USER:postgres}
  password: ${POSTGRES_PASSWORD:}

# Multi-provider pgvector configuration
# Each provider has its own table with matching embedding dimensions
pgvector:
  # Provider-specific tables (recommended for multi-provider support)
  # Note: LlamaIndex automatically prefixes table names with 'data_'
  tables:
    biobert:
      table_name: documents_biobert    # Actual table: data_documents_biobert
      embedding_dimension: 768         # BioBERT fixed dimension
      distance_metric: cosine
    zhipu:
      table_name: documents_zhipu      # Actual table: data_documents_zhipu
      embedding_dimension: 1024        # ZhipuAI embedding-3 dimension
      distance_metric: cosine

  # Legacy single-table config (deprecated, kept for backward compatibility)
  # These values are used only if provider-specific config is not found
  table_name: documents
  embedding_dimension: 768
  distance_metric: cosine
  
elasticsearch:
  url: ${ELASTICSEARCH_URL:http://localhost:9200}
  index_name: newbee_notebook_docs
  # api_key: ${ELASTICSEARCH_API_KEY:}  # Optional for secured clusters
  # cloud_id: ${ELASTICSEARCH_CLOUD_ID:}  # Optional for Elastic Cloud
  
chat_sessions:
  table_sessions: chat_sessions
  table_messages: chat_messages
