# Embedding model configuration

embeddings:
  # Provider selection: 'qwen3-embedding' | 'zhipu'
  # Can be overridden by EMBEDDING_PROVIDER
  provider: qwen3-embedding

  # Qwen3 text embedding (default)
  qwen3-embedding:
    enabled: true
    mode: local                         # local | api
    # Environment overrides:
    # - QWEN3_EMBEDDING_MODE
    # - QWEN3_EMBEDDING_MODEL_PATH
    # - QWEN3_EMBEDDING_DEVICE
    # - QWEN3_EMBEDDING_DIM
    # - QWEN3_EMBEDDING_MAX_LENGTH
    # - QWEN3_EMBEDDING_BATCH_SIZE
    # - QWEN3_EMBEDDING_API_MODEL
    # - QWEN3_EMBEDDING_API_BASE
    model_path: models/Qwen3-Embedding-0.6B
    device: auto                        # auto | cpu | cuda | cuda:0
    max_length: 8192
    dim: 1024
    embed_batch_size: 32
    index_dir: data/indexes/qwen3_embedding

    # API mode options (used when mode=api)
    api_model: text-embedding-v4
    api_base: https://dashscope.aliyuncs.com/compatible-mode/v1

  # ZhipuAI embedding (fallback option)
  zhipu:
    enabled: true
    model: embedding-3
    dim: 1024
    index_dir: data/indexes/zhipu
